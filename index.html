<!DOCTYPE html>
<html>
<head>
  <title>Slot Machine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎰 Slot Machine</h1>

  <div class="game-box">
    <p class="balance-display">Balance <span>$<span id="balance">0</span></span></p>

    <div class="divider"></div>

    <div class="deposit-section">
      <input type="number" id="deposit" placeholder="Deposit amount">
      <button onclick="deposit()">Deposit</button>
    </div>

    <div class="spin-section">
      <input type="number" id="lines" placeholder="Lines (1-3)">
      <input type="number" id="bet" placeholder="Bet per line">
      <button id="spinBtn" onclick="play()">Spin</button>
      <button id="autoSpinBtn">Auto Spin</button>

<select id="autoSpinCount">
  <option value="5">5 Spins</option>
  <option value="10">10 Spins</option>
  <option value="25">25 Spins</option>
  <option value="50">50 Spins</option>
</select>

<button id="stopAutoSpinBtn" disabled>Stop Auto-Spin</button>

    </div>
    <button id="howToPlayBtn">How To Play</button>

<div id="howToPlaySection" class="how-to-play">
  <h3>🎰 How To Play</h3>
  <ul>
    <li>Deposit money to start the game.</li>
    <li>Choose number of lines (1–3).</li>
    <li>Enter bet amount per line.</li>
    <li>Click SPIN to play.</li>
    <li>Match 3 symbols in a row to win.</li>
    <li>Different symbols give different rewards.</li>
  </ul>
</div>

    <div class="divider"></div>

    <div id="slot-display"></div>

    <h2 id="result"></h2>
  </div>

  <script src="project.js"></script>
</body>
</html>
